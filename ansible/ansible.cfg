# ansible/ansible.cfg
# ───────────────────────────────────────────────────────────
# CMDB Infrastructure – Ansible Configuration
# ───────────────────────────────────────────────────────────
[defaults]
# Default inventory (override with -i)
inventory            = inventories/dev/hosts.yml

# Roles path
roles_path           = roles

# SSH settings
remote_user          = deploy
host_key_checking    = False
timeout              = 30
forks                = 10

# Retry files clutter the repo; disable them
retry_files_enabled  = False

# Callback plugins
stdout_callback      = yaml
bin_ansible_callbacks = True

# Vault password file (keep this outside the repo)
# vault_password_file = ~/.ansible/vault_pass_cmdb

# Fact caching (speeds up re-runs)
gathering            = smart
fact_caching         = jsonfile
fact_caching_connection = /tmp/ansible_fact_cache
fact_caching_timeout = 3600

[privilege_escalation]
become               = True
become_method        = sudo
become_user          = root
become_ask_pass      = False

[ssh_connection]
pipelining           = True
ssh_args             = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
