# roles/glassfish/tasks/main.yml
---
- name: Create glassfish group
  ansible.builtin.group:
    name: "{{ glassfish_group }}"
    state: present
  tags: [glassfish]

- name: Create glassfish user
  ansible.builtin.user:
    name: "{{ glassfish_user }}"
    group: "{{ glassfish_group }}"
    home: "{{ glassfish_install_dir }}"
    shell: /bin/bash
    system: true
    create_home: false
  tags: [glassfish]

- name: Create install directory
  ansible.builtin.file:
    path: "{{ glassfish_install_dir }}"
    state: directory
    owner: "{{ glassfish_user }}"
    group: "{{ glassfish_group }}"
    mode: "0755"
  tags: [glassfish]

- name: Download GlassFish {{ glassfish_version }}
  ansible.builtin.get_url:
    url: "{{ glassfish_download_url }}"
    dest: "/tmp/glassfish-{{ glassfish_version }}.zip"
    mode: "0644"
  tags: [glassfish]

- name: Extract GlassFish archive
  ansible.builtin.unarchive:
    src: "/tmp/glassfish-{{ glassfish_version }}.zip"
    dest: "{{ glassfish_install_dir }}"
    remote_src: true
    extra_opts: ["--strip-components=1"]
    creates: "{{ glassfish_install_dir }}/glassfish/bin/asadmin"
    owner: "{{ glassfish_user }}"
    group: "{{ glassfish_group }}"
  tags: [glassfish]

- name: Set ownership recursively
  ansible.builtin.file:
    path: "{{ glassfish_install_dir }}"
    owner: "{{ glassfish_user }}"
    group: "{{ glassfish_group }}"
    recurse: true
  tags: [glassfish]

- name: Create GlassFish admin password file
  ansible.builtin.template:
    src: glassfish-pwdfile.j2
    dest: "{{ glassfish_install_dir }}/.pwdfile"
    owner: "{{ glassfish_user }}"
    group: "{{ glassfish_group }}"
    mode: "0600"
  tags: [glassfish]

- name: Deploy systemd service unit
  ansible.builtin.template:
    src: glassfish.service.j2
    dest: /etc/systemd/system/glassfish.service
    mode: "0644"
  notify: reload systemd
  tags: [glassfish]

- name: Enable and start GlassFish
  ansible.builtin.systemd:
    name: glassfish
    enabled: true
    state: started
    daemon_reload: true
  tags: [glassfish]

- name: Wait for GlassFish HTTP port
  ansible.builtin.wait_for:
    port: "{{ glassfish_http_port }}"
    host: 0.0.0.0
    delay: 5
    timeout: 120
  tags: [glassfish]

- name: Configure JVM options for MongoDB env vars
  ansible.builtin.command: >
    {{ glassfish_install_dir }}/glassfish/bin/asadmin
    --user {{ glassfish_admin_user }}
    --passwordfile {{ glassfish_install_dir }}/.pwdfile
    create-jvm-options
    "-Dmongodb.uri={{ app_mongodb_uri }}"
  register: jvm_opt_uri
  changed_when: "'created' in jvm_opt_uri.stdout"
  failed_when: false
  tags: [glassfish, config]

- name: Configure JVM option for MongoDB database name
  ansible.builtin.command: >
    {{ glassfish_install_dir }}/glassfish/bin/asadmin
    --user {{ glassfish_admin_user }}
    --passwordfile {{ glassfish_install_dir }}/.pwdfile
    create-jvm-options
    "-Dmongodb.db={{ mongodb_app_db }}"
  register: jvm_opt_db
  changed_when: "'created' in jvm_opt_db.stdout"
  failed_when: false
  tags: [glassfish, config]

- name: Configure JVM option for log directory
  ansible.builtin.command: >
    {{ glassfish_install_dir }}/glassfish/bin/asadmin
    --user {{ glassfish_admin_user }}
    --passwordfile {{ glassfish_install_dir }}/.pwdfile
    create-jvm-options
    "-Dlog.dir={{ app_log_dir }}"
  register: jvm_opt_logdir
  changed_when: "'created' in jvm_opt_logdir.stdout"
  failed_when: false
  tags: [glassfish, config]

- name: Create application log directory
  ansible.builtin.file:
    path: "{{ app_log_dir }}"
    state: directory
    owner: "{{ glassfish_user }}"
    group: "{{ glassfish_group }}"
    mode: "0755"
  tags: [glassfish]
